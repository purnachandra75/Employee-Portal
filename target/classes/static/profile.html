<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #eef2ff;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .button {
            border: none;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            background: white;
            color: #667eea;
        }

        .button:hover {
            background: #eef1ff;
        }

        .container {
            max-width: 850px;
            margin: 30px auto;
            padding: 0 20px 40px;
        }

        .card {
            background: white;
            border-radius: 14px;
            padding: 28px;
            box-shadow: 0 14px 36px rgba(102, 120, 255, 0.08);
        }

        h1,
        h2 {
            color: #26315a;
        }

        .profile-row {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 18px;
            padding: 16px 0;
            border-bottom: 1px solid #edf0ff;
        }

        .label {
            font-weight: 700;
            color: #3f4b8d;
        }

        .value {
            color: #5d678f;
        }
    </style>
</head>
<body>
<header>
    <h1>My Profile</h1>
    <div>
        <button class="button" onclick="goBack()">Back to Dashboard</button>
        <button class="button" onclick="logout()">Logout</button>
    </div>
</header>

<div class="container">
    <div class="card">
        <h2>Account Information</h2>
        <div class="profile-row">
            <span class="label">Full Name</span>
            <span class="value" id="fullName">-</span>
        </div>
        <div class="profile-row">
            <span class="label">Username</span>
            <span class="value" id="username">-</span>
        </div>
        <div class="profile-row">
            <span class="label">Email</span>
            <span class="value" id="email">-</span>
        </div>
        <div class="profile-row">
            <span class="label">Roles</span>
            <span class="value" id="roles">-</span>
        </div>
    </div>
</div>

<script>
    function hasAdminRole(roles) {
        if (!Array.isArray(roles)) return false;
        return roles.some(r => {
            if (!r) return false;
            if (typeof r === 'string') return r === 'ROLE_ADMIN';
            if (typeof r === 'object') return (r.name === 'ROLE_ADMIN' || r.role === 'ROLE_ADMIN' || r.authority === 'ROLE_ADMIN');
            return false;
        });
    }

    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user'));

    if (!token || !user) {
        window.location.href = '/login.html';
    }

    if (hasAdminRole(user?.roles)) {
        window.location.href = '/admin.html';
    }

    document.getElementById('fullName').textContent = user.fullName || '-';
    document.getElementById('username').textContent = user.username || '-';
    document.getElementById('email').textContent = user.email || '-';
    const roleNames = Array.isArray(user.roles) ? user.roles.map(r => (typeof r === 'string' ? r : (r.name || r.role || r.authority || ''))).filter(Boolean) : [];
    document.getElementById('roles').textContent = roleNames.length ? roleNames.join(', ') : '-';

    function goBack() {
        window.location.href = '/index.html';
    }

    function logout() {
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        window.location.href = '/login.html';
    }
</script>
</body>
</html>
