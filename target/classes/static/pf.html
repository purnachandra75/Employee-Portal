<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View PF</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f6f7ff;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .button {
            border: none;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            background: white;
            color: #667eea;
        }

        .button:hover {
            background: #eef1ff;
        }

        .container {
            max-width: 900px;
            margin: 30px auto;
            padding: 0 20px 40px;
        }

        .card {
            background: white;
            border-radius: 14px;
            padding: 28px;
            box-shadow: 0 14px 36px rgba(102, 120, 255, 0.08);
        }

        h1,
        h2 {
            color: #26315a;
        }

        p {
            color: #4f5c84;
            line-height: 1.8;
            margin-top: 14px;
        }
    </style>
</head>
<body>
<header>
    <h1>View PF</h1>
    <div>
        <button class="button" onclick="goBack()">Back to Dashboard</button>
        <button class="button" onclick="logout()">Logout</button>
    </div>
</header>

<div class="container">
    <div class="card">
        <h2>Provident Fund Details</h2>
        <p>This page is your PF information placeholder. You can add actual PF balances, contribution history, and fund statements here.</p>
        <p>For now, use the dashboard to navigate back to attendance or other student features.</p>
    </div>
</div>

<script>
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user'));

    if (!token || !user) {
        window.location.href = '/login.html';
    }

    function goBack() {
        window.location.href = '/index.html';
    }

    function logout() {
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        window.location.href = '/login.html';
    }
</script>
</body>
</html>
