<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Submission</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #eef2ff;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .button {
            border: none;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .back-btn,
        .logout-btn {
            background: white;
            color: #667eea;
        }

        .back-btn:hover,
        .logout-btn:hover {
            background: #eef1ff;
        }

        .container {
            max-width: 900px;
            margin: 30px auto;
            padding: 0 20px 40px;
        }

        .card {
            background: white;
            border-radius: 14px;
            padding: 28px;
            box-shadow: 0 14px 36px rgba(102, 120, 255, 0.08);
        }

        h1,
        h2 {
            color: #26315a;
        }

        p {
            color: #4f5c84;
            line-height: 1.8;
            margin-top: 14px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #34418c;
            font-weight: 600;
        }

        input[type="file"] {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d8dfef;
            border-radius: 8px;
            background: #f8fbff;
            color: #2f3f8f;
        }

        .submit-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 14px 24px;
            font-size: 15px;
            cursor: pointer;
            margin-top: 12px;
        }

        .submit-btn:hover {
            background: #5568d3;
        }

        .message {
            margin-top: 20px;
            padding: 14px;
            border-radius: 10px;
            display: none;
            color: #1f3a6d;
            background: #e3ecff;
        }
    </style>
</head>
<body>
<header>
    <h1>Document Submission</h1>
    <div>
        <button class="button back-btn" onclick="goBack()">Back to Dashboard</button>
        <button class="button logout-btn" onclick="logout()">Logout</button>
    </div>
</header>

<div class="container">
    <div class="card">
        <h2>Document Submission</h2>
        <p>Submit your documents and review what you have already uploaded.</p>

        <div id="summarySection" class="summary-section" style="display:none;">
            <h3>Your Submitted Documents</h3>
            <table id="documentSummary" style="width:100%; border-collapse: collapse; margin-top: 16px;">
                <thead>
                    <tr>
                        <th style="text-align:left; padding: 10px; border-bottom: 1px solid #e1e6f5;">Document</th>
                        <th style="text-align:left; padding: 10px; border-bottom: 1px solid #e1e6f5;">Filename</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
            <div style="margin-top: 18px; display:flex; gap: 12px; flex-wrap: wrap;">
                <button class="submit-btn" id="addDocsBtn" type="button">Add Documents</button>
                <button class="submit-btn" id="editDocsBtn" type="button">Edit Documents</button>
            </div>
        </div>

        <div id="formSection">
            <p>Please upload the following documents to complete your submission:</p>
            <form id="documentForm">
                <div class="form-group">
                    <label for="tenth">10th Marksheet</label>
                    <input id="tenth" name="tenth" type="file" accept="application/pdf,image/*" required>
                </div>
                <div class="form-group">
                    <label for="twelfth">12th Marksheet</label>
                    <input id="twelfth" name="twelfth" type="file" accept="application/pdf,image/*" required>
                </div>
                <div class="form-group">
                    <label for="pc">PC </label>
                    <input id="pc" name="pc" type="file" accept="application/pdf,image/*" required>
                </div>
                <div class="form-group">
                    <label for="od">OD</label>
                    <input id="od" name="od" type="file" accept="application/pdf,image/*" required>
                </div>
                <div class="form-group">
                    <label for="pan">PAN Card</label>
                    <input id="pan" name="pan" type="file" accept="application/pdf,image/*" required>
                </div>
                <div class="form-group">
                    <label for="aadhaar">Aadhaar Card</label>
                    <input id="aadhaar" name="aadhaar" type="file" accept="application/pdf,image/*" required>
                </div>
                <div class="form-group">
                    <label for="resume">Resume</label>
                    <input id="resume" name="resume" type="file" accept="application/pdf,.doc,.docx" required>
                </div>
                <div class="form-group">
                    <label for="passport">Passport Photo</label>
                    <input id="passport" name="passport" type="file" accept="image/*" required>
                </div>
                <button class="submit-btn" type="submit">Submit Documents</button>
            </form>
            <div id="message" class="message"></div>
        </div>

    </div>
</div>

<script>
    function hasAdminRole(roles) {
        if (!Array.isArray(roles)) return false;
        return roles.some(r => {
            if (!r) return false;
            if (typeof r === 'string') return r === 'ROLE_ADMIN';
            if (typeof r === 'object') return (r.name === 'ROLE_ADMIN' || r.role === 'ROLE_ADMIN' || r.authority === 'ROLE_ADMIN');
            return false;
        });
    }

    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user'));
    const username = user?.username ? encodeURIComponent(user.username) : null;
    const isAdmin = hasAdminRole(user?.roles);

    if (!token || !user || !username) {
        window.location.href = '/login.html';
    }

    if (isAdmin) {
        window.location.href = '/admin.html';
    }

    const summarySection = document.getElementById('summarySection');
    const formSection = document.getElementById('formSection');
    const documentForm = document.getElementById('documentForm');
    const messageEl = document.getElementById('message');
    const addDocsBtn = document.getElementById('addDocsBtn');
    const editDocsBtn = document.getElementById('editDocsBtn');

    function goBack() {
        window.location.href = '/index.html';
    }

    function logout() {
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        window.location.href = '/login.html';
    }

    function showForm() {
        summarySection.style.display = 'none';
        formSection.style.display = 'block';
        messageEl.style.display = 'none';
    }

    function showMessage(text, type = 'info') {
        messageEl.textContent = text;
        messageEl.style.display = 'block';

        if (type === 'success') {
            messageEl.style.background = '#e6ffed';
            messageEl.style.color = '#1f6f3b';
        } else if (type === 'error') {
            messageEl.style.background = '#fff3cd';
            messageEl.style.color = '#856404';
        } else {
            messageEl.style.background = '#e3f2fd';
            messageEl.style.color = '#0d47a1';
        }
    }

    function renderSummary(docs) {
        if (!docs) {
            showForm();
            return;
        }

        const tbody = document.querySelector('#documentSummary tbody');
        tbody.innerHTML = '';

        Object.keys(docs).forEach(key => {
            const row = document.createElement('tr');
            const filename = docs[key].filename;
            row.innerHTML = `
                <td style="padding: 10px; border-bottom: 1px solid #e1e6f5;">${docs[key].label}</td>
                <td style="padding: 10px; border-bottom: 1px solid #e1e6f5;">
                    <a href="javascript:void(0);" onclick="downloadDocument('${key}', '${filename}'); return false;" style="color: #667eea; text-decoration: none; cursor: pointer;">${filename}</a>
                </td>
            `;
            tbody.appendChild(row);
        });

        summarySection.style.display = 'block';
        formSection.style.display = 'none';
        messageEl.style.display = 'none';
    }

    async function downloadDocument(field, filename) {
        try {
            const response = await fetch(`/api/documents/download/${field}?username=${username}`, {
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            });

            if (!response.ok) {
                showMessage('Unable to open document. Please try again.', 'error');
                return;
            }

            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            window.open(url, '_blank');
        } catch (error) {
            showMessage('Failed to open document. Please try again later.', 'error');
        }
    }

    async function loadUserDocuments() {
        try {
            const response = await fetch(`/api/documents/my-files?username=${username}`, {
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            });
            const result = await response.json();

            if (!response.ok) {
                showForm();
                showMessage(result.error || 'Unable to load your submitted documents.', 'error');
                return;
            }

            if (!result.exists) {
                showForm();
                return;
            }

            renderSummary(result.files);
        } catch (error) {
            showForm();
            showMessage('Unable to load submitted documents. Please refresh the page.', 'error');
        }
    }

    addDocsBtn.addEventListener('click', () => {
        showForm();
    });

    editDocsBtn.addEventListener('click', () => {
        showForm();
        showMessage('You can replace previously submitted documents now.', 'info');
    });

    documentForm.addEventListener('submit', async function (event) {
        event.preventDefault();

        const fields = [
            { id: 'tenth', label: '10th Marksheet' },
            { id: 'twelfth', label: '12th Marksheet' },
            { id: 'pc', label: 'PC' },
            { id: 'od', label: 'OD' },
            { id: 'pan', label: 'PAN Card' },
            { id: 'aadhaar', label: 'Aadhaar Card' },
            { id: 'resume', label: 'Resume' },
            { id: 'passport', label: 'Passport Photo' }
        ];

        const missing = [];
        fields.forEach(field => {
            const input = document.getElementById(field.id);
            if (!input.files.length) {
                missing.push(field.label);
            }
        });

        if (missing.length > 0) {
            showMessage(`Please upload: ${missing.join(', ')}.`, 'error');
            return;
        }

        const formData = new FormData(documentForm);
        formData.append('username', user.username);

        try {
            const response = await fetch('/api/documents/upload', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`
                },
                body: formData
            });
            const result = await response.json();

            if (!response.ok) {
                showMessage(result.error || 'Upload failed. Please try again.', 'error');
                return;
            }

            documentForm.reset();
            showMessage(result.message || 'Documents submitted successfully.', 'success');
            await loadUserDocuments();
        } catch (error) {
            showMessage('Unable to upload documents. Please try again later.', 'error');
        }
    });

    loadUserDocuments();
</script>
</body>
</html>
