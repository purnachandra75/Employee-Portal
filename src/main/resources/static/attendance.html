<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f6ff;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .button {
            border: none;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .back-btn {
            background: white;
            color: #667eea;
        }

        .back-btn:hover {
            background: #eef1ff;
        }

        .logout-btn {
            background: #f44336;
            color: white;
        }

        .logout-btn:hover {
            background: #da190b;
        }

        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 20px 40px;
        }

        .card {
            background: white;
            border-radius: 14px;
            padding: 28px;
            box-shadow: 0 16px 40px rgba(103, 110, 255, 0.08);
            margin-bottom: 20px;
        }

        h1,
        h2 {
            color: #24315f;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .btn-login,
        .btn-logout {
            border: none;
            border-radius: 8px;
            padding: 14px 22px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 700;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .btn-login {
            background: #4caf50;
            color: white;
        }

        .btn-login:hover {
            transform: translateY(-1px);
        }

        .btn-logout {
            background: #f44336;
            color: white;
        }

        .btn-logout:hover {
            transform: translateY(-1px);
        }

        .btn-logout:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .status-box {
            background: #e3f2fd;
            padding: 18px;
            border-radius: 10px;
            border-left: 5px solid #2196F3;
            margin-bottom: 24px;
        }

        .status-box.logged-in {
            background: #c8e6c9;
            border-left-color: #4CAF50;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 14px 12px;
            border-bottom: 1px solid #e0e6ff;
        }

        th {
            text-align: left;
            font-weight: 700;
            color: #4153a1;
            background: #f5f7ff;
        }

        tr:hover {
            background: #fbfdff;
        }

        .message {
            padding: 14px;
            border-radius: 10px;
            margin-bottom: 24px;
            display: none;
        }

        .message.error {
            display: block;
            background: #ffebee;
            color: #c62828;
        }

        .message.success {
            display: block;
            background: #e8f5e9;
            color: #2e7d32;
        }
    </style>
</head>
<body>
<header>
    <h1>Attendance Page</h1>
    <div class="header-actions">
        <button class="button back-btn" onclick="goBack()">Back to Dashboard</button>
        <button class="button logout-btn" onclick="logout()">Logout</button>
    </div>
</header>

<div class="container">
    <div id="message" class="message"></div>

    <div class="card">
        <h2>Attendance Status</h2>
        <div id="statusBox" class="status-box">
            <p id="statusText">Not logged in</p>
        </div>

        <div class="action-buttons">
            <button class="btn-login" id="loginBtn" onclick="clockIn()">Clock In</button>
            <button class="btn-logout" id="logoutBtn" onclick="clockOut()" disabled>Clock Out</button>
        </div>
    </div>

    <div class="card">
        <h2>Your Attendance Records</h2>
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Login Time</th>
                <th>Logout Time</th>
                <th>Working Hours</th>
                <th>Status</th>
            </tr>
            </thead>
            <tbody id="recordsTable">
            <tr>
                <td colspan="5" style="text-align:center; color:#999;">Loading records...</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    function hasAdminRole(roles) {
        if (!Array.isArray(roles)) return false;
        return roles.some(r => {
            if (!r) return false;
            if (typeof r === 'string') return r === 'ROLE_ADMIN';
            if (typeof r === 'object') return (r.name === 'ROLE_ADMIN' || r.role === 'ROLE_ADMIN' || r.authority === 'ROLE_ADMIN');
            return false;
        });
    }

    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user'));
    const username = user?.username ? encodeURIComponent(user.username) : null;
    const isAdmin = hasAdminRole(user?.roles);

    if (!token || !user || !username) {
        window.location.href = '/login.html';
    }

    if (isAdmin) {
        window.location.href = '/admin.html';
    }

    function goBack() {
        window.location.href = isAdmin ? '/admin.html' : '/index.html';
    }

    function logout() {
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        window.location.href = '/login.html';
    }

    async function checkLoginStatus() {
        try {
            const response = await fetch(`/api/attendance/current-status?username=${username}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (!response.ok) throw new Error('Failed to check status');
            const data = await response.json();
            updateStatusUI(data.isLoggedIn, data.loginTime);
            loadRecords();
        } catch (error) {
            showMessage('Unable to load attendance status.', true);
            console.error(error);
        }
    }

    function updateStatusUI(isLoggedIn, loginTime = null) {
        const statusBox = document.getElementById('statusBox');
        const statusText = document.getElementById('statusText');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');

        if (isLoggedIn) {
            statusBox.classList.add('logged-in');
            statusText.textContent = `You are logged in since ${new Date(loginTime).toLocaleString()}`;
            loginBtn.disabled = true;
            logoutBtn.disabled = false;
        } else {
            statusBox.classList.remove('logged-in');
            statusText.textContent = 'You are not logged in';
            loginBtn.disabled = false;
            logoutBtn.disabled = true;
        }
    }

    async function clockIn() {
        try {
            const response = await fetch(`/api/attendance/login?username=${username}`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await response.json();
            if (!response.ok) {
                showMessage(data.error || 'Clock in failed.', true);
                return;
            }
            showMessage(data.message);
            checkLoginStatus();
        } catch (error) {
            showMessage('Error: ' + error.message, true);
        }
    }

    async function clockOut() {
        try {
            const response = await fetch(`/api/attendance/logout?username=${username}`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await response.json();
            if (!response.ok) {
                showMessage(data.error || 'Clock out failed.', true);
                return;
            }
            showMessage(`${data.message} Working hours: ${data.workingHours || '-'} hrs`);
            checkLoginStatus();
        } catch (error) {
            showMessage('Error: ' + error.message, true);
        }
    }

    async function loadRecords() {
        try {
            const response = await fetch(`/api/attendance/my-records?username=${username}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (!response.ok) throw new Error('Failed to load records');
            const records = await response.json();
            const tbody = document.getElementById('recordsTable');

            if (!records || records.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:#999;">No records found</td></tr>';
                return;
            }

            tbody.innerHTML = records.map(record => `
                <tr>
                    <td>${record.id}</td>
                    <td>${new Date(record.loginTime).toLocaleString()}</td>
                    <td>${record.logoutTime ? new Date(record.logoutTime).toLocaleString() : '-'}</td>
                    <td>${record.workingHours ? record.workingHours.toFixed(2) : '-'} hrs</td>
                    <td><strong>${record.status}</strong></td>
                </tr>
            `).join('');
        } catch (error) {
            console.error('Error loading records:', error);
        }
    }

    function showMessage(message, isError = false) {
        const msg = document.getElementById('message');
        msg.textContent = message;
        msg.className = 'message ' + (isError ? 'error' : 'success');
        setTimeout(() => {
            msg.className = 'message';
        }, 4000);
    }

    checkLoginStatus();
</script>
</body>
</html>
